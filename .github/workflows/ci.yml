name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.9 = the deployment target (CentOS 7 / miniconda); 3.12 = modern check
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (src layout → editable install puts gitkit on path)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Configure git identity (the write-path tests shell out to git)
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "gitkit CI"
          git config --global init.defaultBranch main

      - name: Run tests
        run: python -m unittest discover -s tests -v
